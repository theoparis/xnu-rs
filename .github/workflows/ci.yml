name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: clippy
          targets: aarch64-unknown-none,aarch64-unknown-uefi,aarch64-apple-darwin

      - name: clippy
        run: cargo xtask clippy
